<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Товар — JUNGLE</title>
<link rel="stylesheet" href="style.css">

</head>
<body>
<header class="header" id="hdr">
  <a class="logo" href="index.html">
    <img src="logo.png" alt="JUNGLE" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span class="logo-svg" style="display:none">JUNGLE</span>
  </a>
  <nav class="nav">
    <a href="catalog.html">Каталог</a>
    <a href="about.html">О нас</a>
    <a href="contacts.html">Контакты</a>
    <a href="shipping.html">Оплата и доставка</a>
  </nav>
  <div class="hright">
    <span class="login-link" id="login-link" onclick="goLogin()">Войти в кабинет</span>
    <div class="cart-btn" id="cart-btn" onclick="location.href='cart.html'">
      <svg class="cart-icon" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.5 4H5.2L7.5 18H21.5L24.5 8H9.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="11" cy="22.5" r="2" fill="#294340" stroke="none"/>
        <circle cx="20" cy="22.5" r="2" fill="#294340" stroke="none"/>
      </svg>
      <span class="cart-badge" id="cart-badge">0</span>
    </div>
    <div class="burger" id="burger" onclick="toggleBurger()"><span></span><span></span><span></span></div>
  </div>
</header>
<nav class="mnav" id="mnav">
  <a href="catalog.html">Каталог</a>
  <a href="about.html">О нас</a>
  <a href="contacts.html">Контакты</a>
  <a href="shipping.html">Оплата и доставка</a>
  <a onclick="goLogin()">Войти в кабинет</a>
</nav>

<div class="product-layout">
  <img class="product-photo" id="prod-img" src="" alt="">
  <div class="product-info">
    <div class="product-name" id="prod-name"></div>
    <div class="product-sub">
      <span id="prod-sub"></span>
      <span class="product-qty" id="prod-qty"></span>
    </div>
    <div class="product-price" id="prod-price"></div>
    <button class="btn-add" onclick="addCurrent()">ДОБАВИТЬ В КОРЗИНУ</button>
    <div style="margin-top:24px">
      <a href="catalog.html" style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mgray);text-decoration:underline">← Назад в каталог</a>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="app.js"></script>
<script>initProduct();</script>
</body></html>
