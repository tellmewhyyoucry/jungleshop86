<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Оформление заказа — JUNGLE</title>
<link rel="stylesheet" href="style.css">

</head>
<body>
<header class="header" id="hdr">
  <a class="logo" href="index.html">
    <img src="logo.png" alt="JUNGLE" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span class="logo-svg" style="display:none">JUNGLE</span>
  </a>
  <nav class="nav">
    <a href="catalog.html">Каталог</a>
    <a href="about.html">О нас</a>
    <a href="contacts.html">Контакты</a>
    <a href="shipping.html">Оплата и доставка</a>
  </nav>
  <div class="hright">
    <span class="login-link" id="login-link" onclick="goLogin()">Войти в кабинет</span>
    <div class="cart-btn" id="cart-btn" onclick="location.href='cart.html'">
      <svg class="cart-icon" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.5 4H5.2L7.5 18H21.5L24.5 8H9.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="11" cy="22.5" r="2" fill="#294340" stroke="none"/>
        <circle cx="20" cy="22.5" r="2" fill="#294340" stroke="none"/>
      </svg>
      <span class="cart-badge" id="cart-badge">0</span>
    </div>
    <div class="burger" id="burger" onclick="toggleBurger()"><span></span><span></span><span></span></div>
  </div>
</header>
<nav class="mnav" id="mnav">
  <a href="catalog.html">Каталог</a>
  <a href="about.html">О нас</a>
  <a href="contacts.html">Контакты</a>
  <a href="shipping.html">Оплата и доставка</a>
  <a onclick="goLogin()">Войти в кабинет</a>
</nav>

<div class="flay">
  <div class="fleft">
    <h1 class="ftitle">ЗАПОЛНИТЕ ДАННЫЕ ДЛЯ ОФОРМЛЕНИЯ ЗАКАЗА</h1>
    <div class="fgroup"><label class="flabel">Имя получателя</label><input class="finput" type="text" id="dname" placeholder="ВАДИМ"></div>
    <div class="fgroup"><label class="flabel">Фамилия получателя</label><input class="finput" type="text" id="dsur" placeholder="РАХИМОВ"></div>
    <div class="fgroup"><label class="flabel">Номер телефона получателя</label><input class="finput" type="tel" id="dphone" placeholder="+7 904 450 77 77"></div>
    <div class="fgroup"><label class="flabel">Адрес</label><input class="finput" type="text" id="daddr" placeholder="Г. СОВЕТСКИЙ УЛ. КИЕВСКАЯ Д. 7"></div>
    <div class="fgroup"><label class="flabel">Внимание — способ оплаты</label><input class="finput" type="text" value="БАНКОВСКОЙ КАРТОЙ, СБП, TPAY, SBERPAY" readonly></div>
    <div class="sp-row">
      <span class="sp-label">Самовывоз</span>
      <div class="sp-check" id="sp-check" onclick="toggleSP()"></div>
    </div>
    <div class="total-row">
      <span class="total-amt" id="deliv-total">0 ₽</span>
      <button class="btn-proceed" onclick="goPayment()">ПРОДОЛЖИТЬ</button>
    </div>
  </div>
  <div class="fright">
    <div class="fright-inner">
      <img class="fright-img" src="jungle.jpg" alt="JUNGLE" onerror="this.style.display='none'">
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="app.js"></script>
<script>initDelivery();</script>
</body></html>
