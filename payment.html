<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Оплата — JUNGLE</title>
<link rel="stylesheet" href="style.css">

</head>
<body>
<header class="header" id="hdr">
  <a class="logo" href="index.html">
    <img src="logo.png" alt="JUNGLE" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span class="logo-svg" style="display:none">JUNGLE</span>
  </a>
  <nav class="nav">
    <a href="catalog.html">Каталог</a>
    <a href="about.html">О нас</a>
    <a href="contacts.html">Контакты</a>
    <a href="shipping.html">Оплата и доставка</a>
  </nav>
  <div class="hright">
    <span class="login-link" id="login-link" onclick="goLogin()">Войти в кабинет</span>
    <div class="cart-btn" id="cart-btn" onclick="location.href='cart.html'">
      <svg class="cart-icon" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.5 4H5.2L7.5 18H21.5L24.5 8H9.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="11" cy="22.5" r="2" fill="#294340" stroke="none"/>
        <circle cx="20" cy="22.5" r="2" fill="#294340" stroke="none"/>
      </svg>
      <span class="cart-badge" id="cart-badge">0</span>
    </div>
    <div class="burger" id="burger" onclick="toggleBurger()"><span></span><span></span><span></span></div>
  </div>
</header>
<nav class="mnav" id="mnav">
  <a href="catalog.html">Каталог</a>
  <a href="about.html">О нас</a>
  <a href="contacts.html">Контакты</a>
  <a href="shipping.html">Оплата и доставка</a>
  <a onclick="goLogin()">Войти в кабинет</a>
</nav>

<div class="flay">
  <div class="fleft">
    <h1 class="ftitle">ОПЛАТИТЬ КАРТОЙ</h1>
    <div class="fgroup"><label class="flabel">Номер карты</label><input class="finput" type="text" id="cnum" placeholder="2200 7786 7788 2910" maxlength="19" inputmode="numeric"></div>
    <div class="fgroup"><label class="flabel">ММ/ГГ</label><input class="finput" type="text" id="cexp" placeholder="09/29" maxlength="5" inputmode="numeric"></div>
    <div class="fgroup"><label class="flabel">Имя на карте</label><input class="finput" type="text" id="cnam" placeholder="VADIM RAHIMOV"></div>
    <div class="fgroup"><label class="flabel">CVC</label><input class="finput" type="text" id="ccvc" placeholder="778" maxlength="3" inputmode="numeric"></div>
    <div class="total-row">
      <span class="total-amt" id="pay-total">0 ₽</span>
      <button class="btn-proceed" onclick="placeOrder()">ОПЛАТИТЬ</button>
    </div>
  </div>
  <div class="fright">
    <div class="fright-inner">
      <img class="fright-img" src="jungle.jpg" alt="JUNGLE" onerror="this.style.display='none'">
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
(function(){
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',function(){ initPayment(); initCardMasks(); })}else{ initPayment(); initCardMasks(); }
})();
</script>
<script src="app.js"></script>
<script>initPayment(); initCardMasks();</script>
</body></html>
